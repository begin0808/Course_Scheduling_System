# 選用的本機 git hook。安裝方式:pip install pre-commit && pre-commit install
# 主要品質關卡以 CI 為準;此設定讓提交前先自動修正常見問題。
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff(後端 lint 自動修正)
        args: [--fix]
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
