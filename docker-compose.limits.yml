# M5-4 驗收③:以總量 ~4GB 的記憶體上限跑整套系統,驗證全流程不 OOM。
# 疊在正式 compose 之上使用:
#   docker compose -f docker-compose.yml -f docker-compose.limits.yml up -d
# 六容器上限合計約 3.7GB,留約 0.4GB 給主機與尖峰。亦可作為 4GB 主機/NAS 的部署參考。
#
# 兩個 worker 的預算差很多,因為工作性質不同(M6-2):
#   worker      → 排課引擎(OR-Tools 求解 60 班會吃掉大半),分到最多
#   worker-ops  → 匯出/備份/還原/寄信;WeasyPrint 渲染一張 A4 課表的峰值遠低於求解
name: scheduling

services:
  postgres:
    mem_limit: 512m
  redis:
    mem_limit: 256m
  api:
    mem_limit: 768m
  worker:
    mem_limit: 1536m
  worker-ops:
    mem_limit: 512m
  web:
    mem_limit: 128m
