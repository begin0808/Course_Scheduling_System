name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: 後端 lint / type / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安裝相依
        run: pip install -e ".[dev]"
      - name: Ruff(格式與規則)
        run: ruff check .
      - name: Mypy(型別檢查)
        run: mypy app
      - name: Pytest(單元測試)
        run: python -m pytest -q

  frontend:
    name: 前端 lint / build / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 安裝相依
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: 建置(含 vue-tsc 型別檢查)
        run: npm run build
      - name: Vitest(單元測試)
        run: npm run test

  images:
    name: 建置並發布雙架構映像(main)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: 計算映像名稱(需小寫)
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: 登入 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 建置並推送 api 映像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-api:latest
            ${{ env.IMAGE_BASE }}-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: 建置並推送 web 映像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-web:latest
            ${{ env.IMAGE_BASE }}-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
