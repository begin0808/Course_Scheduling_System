name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  backend:
    name: 後端 lint / type / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安裝相依
        run: pip install -e ".[dev]"
      - name: Ruff(格式與規則)
        run: ruff check .
      - name: Mypy(型別檢查)
        run: mypy app
      - name: Pytest(單元測試)
        run: python -m pytest -q

  frontend:
    name: 前端 lint / build / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 安裝相依
        run: npm install --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: 建置(含 vue-tsc 型別檢查)
        run: npm run build
      - name: Vitest(單元測試)
        run: npm run test

  migrations:
    name: 資料庫遷移驗證(PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scheduler
          POSTGRES_PASSWORD: scheduler
          POSTGRES_DB: scheduler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scheduler"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安裝相依
        run: pip install -e ".[dev]"
      - name: 對全新 PostgreSQL 執行 alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://scheduler:scheduler@localhost:5432/scheduler
        run: alembic upgrade head

  images:
    name: 建置並發布映像
    runs-on: ubuntu-latest
    needs: [backend, frontend, migrations]
    # main push:僅 amd64(快速);版本標籤 v*:amd64+arm64 雙架構(正式發布)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: 計算映像名稱(需小寫)
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: 決定建置架構
        id: platforms
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: 登入 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 建置並推送 api 映像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: base
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          # ref_name:main push 為 "main";版本標籤推送則為 "v1.0.0"(供 .env 的 IMAGE_TAG 釘選)
          tags: |
            ${{ env.IMAGE_BASE }}-api:latest
            ${{ env.IMAGE_BASE }}-api:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: 建置並推送 worker 映像(含 PDF/字型依賴)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: worker
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-worker:latest
            ${{ env.IMAGE_BASE }}-worker:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
      - name: 建置並推送 web 映像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-web:latest
            ${{ env.IMAGE_BASE }}-web:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
