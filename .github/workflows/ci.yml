name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  backend:
    name: 後端 lint / type / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安裝相依
        run: pip install -e ".[dev]"
      - name: Ruff(格式與規則)
        run: ruff check .
      - name: Mypy(型別檢查)
        run: mypy app
      - name: Pytest(單元測試)
        run: python -m pytest -q

  frontend:
    name: 前端 lint / build / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安裝相依(依 lock 檔完全重現)
        run: npm ci --no-audit --no-fund
      - name: ESLint
        run: npm run lint
      - name: 建置(含 vue-tsc 型別檢查)
        run: npm run build
      - name: Vitest(單元測試)
        run: npm run test

  migrations:
    name: 資料庫遷移驗證(PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scheduler
          POSTGRES_PASSWORD: scheduler
          POSTGRES_DB: scheduler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scheduler"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安裝相依
        run: pip install -e ".[dev]"
      - name: 對全新 PostgreSQL 執行 alembic upgrade head
        env:
          DATABASE_URL: postgresql+psycopg://scheduler:scheduler@localhost:5432/scheduler
        run: alembic upgrade head

  e2e:
    name: E2E 驗收(Playwright 對 Docker 全棧)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # 在 runner 上以 buildx 建三個映像(不推送,load 進本機 daemon)。
      # 不拉 :main 現成映像的原因:PR 必須驗 PR 自己的程式碼;
      # 快取 scope 與 images job 共用,main 建過之後 PR 的建置只剩分鐘級。
      - name: 建置 api 映像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: base
          load: true
          tags: ghcr.io/begin0808/course_scheduling_system-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: 建置 worker 映像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: worker
          load: true
          tags: ghcr.io/begin0808/course_scheduling_system-worker:ci
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
      - name: 建置 web 映像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          load: true
          tags: ghcr.io/begin0808/course_scheduling_system-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
      - name: 準備 .env 並啟動全棧
        run: |
          cat > .env <<'EOF'
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=ci-admin-password
          SCHOOL_NAME=CI 測試學校
          TZ=Asia/Taipei
          SECRET_KEY=ci-e2e-not-a-secret-0123456789abcdef
          HTTP_PORT=80
          IMAGE_TAG=ci
          POSTGRES_USER=scheduler
          POSTGRES_PASSWORD=scheduler
          POSTGRES_DB=scheduler
          DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
          REDIS_URL=redis://redis:6379/0
          EOF
          docker compose up -d --no-build --wait --wait-timeout 180
      - name: 建立 E2E 帳號與精靈狀態
        run: docker compose exec -T api python -m app.scripts.seed_e2e
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安裝前端相依與 Playwright 瀏覽器
        working-directory: frontend
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium
      - name: 執行 E2E 迴歸套件(chromium project)
        working-directory: frontend
        run: npm run e2e
      - name: 失敗時收集容器紀錄
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt || true
      - name: 上傳診斷產物(報告 / trace / 失敗截圖 / 容器紀錄)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            frontend/playwright-report/
            frontend/test-results/
            compose-logs.txt
          retention-days: 7
          if-no-files-found: ignore

  images:
    name: 建置並發布映像
    runs-on: ubuntu-latest
    # e2e 為前置:E2E 紅燈時不得發布映像
    needs: [backend, frontend, migrations, e2e]
    # main push:僅 amd64(快速);版本標籤 v*:amd64+arm64 雙架構(正式發布)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: 計算映像名稱(需小寫)
        run: echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: 決定建置架構與 channel 標籤
        id: platforms
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            if [[ "${{ github.ref_name }}" == *-* ]]; then
              # 預發布(如 v1.0.0-rc1):建雙架構供演練,但 channel 用自身標籤,不動 :latest
              echo "channel=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            else
              # 正式版才更新 :latest;main push 僅單架構,不可覆蓋 :latest
              # 否則 ARM 用戶(IMAGE_TAG=latest)pull 到只有 amd64 的 manifest 會起不來
              echo "channel=latest" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "channel=main" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: 登入 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 建置並推送 api 映像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: base
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          # ref_name:main push 為 "main";版本標籤推送則為 "v1.0.0"(供 .env 的 IMAGE_TAG 釘選)
          tags: |
            ${{ env.IMAGE_BASE }}-api:${{ steps.platforms.outputs.channel }}
            ${{ env.IMAGE_BASE }}-api:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: 建置並推送 worker 映像(含 PDF/字型依賴)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: worker
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-worker:${{ steps.platforms.outputs.channel }}
            ${{ env.IMAGE_BASE }}-worker:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
      - name: 建置並推送 web 映像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-web:${{ steps.platforms.outputs.channel }}
            ${{ env.IMAGE_BASE }}-web:${{ github.ref_name }}
            ${{ env.IMAGE_BASE }}-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
